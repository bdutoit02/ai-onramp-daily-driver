<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<style>
  :root { --bg2: #F1EFE8; --s: #888780; --t: #2C2C2A; }
  @media (prefers-color-scheme: dark) { :root { --bg2: #2C2C2A; --s: #888780; --t: #F1EFE8; } }
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: var(--t); }
  .ts { font-size: 12px; font-weight: 400; fill: var(--t); }
  .arr { stroke: var(--s); stroke-width: 1.5; }
  .leader { stroke: var(--s); stroke-width: 0.5; stroke-dasharray: 3 3; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  @media (prefers-color-scheme: dark) {
    .c-teal rect { fill: #085041; stroke: #5DCAA5; }
    .c-teal .th { fill: #9FE1CB; }
    .c-purple rect { fill: #26215C; stroke: #AFA9EC; }
    .c-purple .th { fill: #CECBF6; }
    .c-coral rect { fill: #4A1B0C; stroke: #F0997B; }
    .c-coral .th { fill: #F5C4B3; }
  }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text class="th" x="340" y="30" text-anchor="middle">Defensible under scrutiny</text>
<text class="ts" x="340" y="48" text-anchor="middle">How each step contributes to a report you can stand behind</text>

<text class="ts" x="70" y="96" text-anchor="end">73</text>
<g class="c-teal">
<rect x="82" y="76" width="220" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="192" y="98" text-anchor="middle" dominant-baseline="central">DR sweep</text>
</g>
<text class="ts" x="320" y="90" text-anchor="start">Breadth: catches sources</text>
<text class="ts" x="320" y="106" text-anchor="start">a single search would miss</text>

<line x1="192" y1="120" x2="192" y2="146" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="70" y="171" text-anchor="end">+40</text>
<g class="c-teal">
<rect x="82" y="151" width="220" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="192" y="173" text-anchor="middle" dominant-baseline="central">Training knowledge sweep</text>
</g>
<text class="ts" x="320" y="165" text-anchor="start">Coverage: finds authoritative</text>
<text class="ts" x="320" y="181" text-anchor="start">sources DR didn't surface</text>

<line x1="192" y1="195" x2="192" y2="221" class="arr" marker-end="url(#arrow)"/>

<g class="c-purple">
<rect x="82" y="226" width="220" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="192" y="248" text-anchor="middle" dominant-baseline="central">Human knowledge sweep</text>
</g>
<text class="ts" x="320" y="240" text-anchor="start">Domain judgment: expertise</text>
<text class="ts" x="320" y="256" text-anchor="start">no model can substitute</text>

<line x1="192" y1="270" x2="192" y2="296" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="70" y="321" text-anchor="end">115</text>
<g class="c-teal">
<rect x="82" y="301" width="220" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="192" y="323" text-anchor="middle" dominant-baseline="central">Source quality check</text>
</g>
<text class="ts" x="320" y="315" text-anchor="start">Verification: dead links, outdated</text>
<text class="ts" x="320" y="331" text-anchor="start">data, weak sources removed</text>

<line x1="192" y1="345" x2="192" y2="371" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="70" y="396" text-anchor="end">40</text>
<g class="c-purple">
<rect x="82" y="376" width="220" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="192" y="398" text-anchor="middle" dominant-baseline="central">Human curation</text>
</g>
<text class="ts" x="320" y="390" text-anchor="start">Accountability: every source chosen</text>
<text class="ts" x="320" y="406" text-anchor="start">deliberately, none by default</text>

<line x1="192" y1="420" x2="192" y2="446" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="82" y="451" width="220" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="192" y="473" text-anchor="middle" dominant-baseline="central">Literature review</text>
</g>
<text class="ts" x="320" y="465" text-anchor="start">Traceability: what each source</text>
<text class="ts" x="320" y="481" text-anchor="start">actually says, preserved individually</text>

<line x1="192" y1="495" x2="192" y2="521" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
<rect x="82" y="526" width="220" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="192" y="548" text-anchor="middle" dominant-baseline="central">Analytical synthesis</text>
</g>
<text class="ts" x="320" y="540" text-anchor="start">Honesty: evidence strength rated,</text>
<text class="ts" x="320" y="556" text-anchor="start">tensions surfaced, gaps identified</text>

<line x1="192" y1="570" x2="192" y2="596" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
<rect x="82" y="601" width="220" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="192" y="626" text-anchor="middle" dominant-baseline="central">Defensible report</text>
</g>
<text class="ts" x="320" y="618" text-anchor="start">Every claim traceable to sources.</text>
<text class="ts" x="320" y="634" text-anchor="start">Gaps acknowledged. Strengths stated.</text>

<g class="c-teal">
<rect x="120" y="700" width="14" height="14" rx="3" stroke-width="0.5"/>
</g>
<text class="ts" x="142" y="712">AI-driven step</text>

<g class="c-purple">
<rect x="270" y="700" width="14" height="14" rx="3" stroke-width="0.5"/>
</g>
<text class="ts" x="292" y="712">Human judgment step</text>

<g class="c-coral">
<rect x="440" y="700" width="14" height="14" rx="3" stroke-width="0.5"/>
</g>
<text class="ts" x="462" y="712">Final output</text>

<path d="M56 82 L56 410" fill="none" stroke="var(--s)" stroke-width="0.5" opacity="0.3"/>
<text class="ts" x="46" y="250" text-anchor="middle" transform="rotate(-90, 46, 250)">Sources narrow</text>

<text class="ts" x="340" y="750" text-anchor="middle">This is one path through a directed research process. The specific steps, sequence,</text>
<text class="ts" x="340" y="766" text-anchor="middle">and tools will vary with the research question, the audience, and the available toolkit.</text>

</svg>